<svg width="495" height="195" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="495" height="195" rx="6" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="25" y="35" fill="#58a6ff" font-size="14" font-family="'Segoe UI',Helvetica,sans-serif" font-weight="600">Top Languages</text>

  <!-- Language bars -->
  <g font-family="'Segoe UI',Helvetica,sans-serif">
    <!-- JavaScript -->
    <text x="25" y="70" fill="#e6edf3" font-size="12" font-weight="500">JavaScript</text>
    <text x="465" y="70" fill="#8b949e" font-size="12" text-anchor="end">4 repos</text>
    <rect x="25" y="78" width="440" height="6" rx="3" fill="#21262d"/>
    <rect x="25" y="78" width="440" height="6" rx="3" fill="#f1e05a" opacity="0.85"/>

    <!-- Rust -->
    <text x="25" y="105" fill="#e6edf3" font-size="12" font-weight="500">Rust</text>
    <text x="465" y="105" fill="#8b949e" font-size="12" text-anchor="end">3 repos</text>
    <rect x="25" y="113" width="330" height="6" rx="3" fill="#21262d"/>
    <rect x="25" y="113" width="330" height="6" rx="3" fill="#dea584" opacity="0.85"/>

    <!-- Python -->
    <text x="25" y="140" fill="#e6edf3" font-size="12" font-weight="500">Python</text>
    <text x="465" y="140" fill="#8b949e" font-size="12" text-anchor="end">2 repos</text>
    <rect x="25" y="148" width="220" height="6" rx="3" fill="#21262d"/>
    <rect x="25" y="148" width="220" height="6" rx="3" fill="#3572A5" opacity="0.85"/>

    <!-- TypeScript -->
    <text x="25" y="175" fill="#e6edf3" font-size="12" font-weight="500">TypeScript</text>
    <text x="465" y="175" fill="#8b949e" font-size="12" text-anchor="end">2 repos</text>
    <rect x="25" y="183" width="220" height="6" rx="3" fill="#21262d"/>
    <rect x="25" y="183" width="220" height="6" rx="3" fill="#3178C6" opacity="0.85"/>
  </g>
