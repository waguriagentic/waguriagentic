<svg width="495" height="195" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="495" height="195" rx="6" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="25" y="35" fill="#58a6ff" font-size="14" font-family="'Segoe UI',Helvetica,sans-serif" font-weight="600">GitHub Stats</text>

  <!-- Stats grid -->
  <g font-family="'Segoe UI',Helvetica,sans-serif">
    <!-- Total Stars -->
    <text x="25" y="75" fill="#8b949e" font-size="12">Total Stars</text>
    <text x="25" y="95" fill="#e6edf3" font-size="22" font-weight="700">175</text>

    <!-- Total Repos -->
    <text x="180" y="75" fill="#8b949e" font-size="12">Public Repos</text>
    <text x="180" y="95" fill="#e6edf3" font-size="22" font-weight="700">19</text>

    <!-- Forks -->
    <text x="335" y="75" fill="#8b949e" font-size="12">Total Forks</text>
    <text x="335" y="95" fill="#e6edf3" font-size="22" font-weight="700">94</text>

    <!-- Followers -->
    <text x="25" y="140" fill="#8b949e" font-size="12">Followers</text>
    <text x="25" y="160" fill="#e6edf3" font-size="22" font-weight="700">93</text>

    <!-- Stars icon -->
    <text x="180" y="140" fill="#8b949e" font-size="12">Since</text>
    <text x="180" y="160" fill="#e6edf3" font-size="22" font-weight="700">May 2026</text>
  </g>
</svg>
